<style>
:root {
  --bg:    #0a0a12;
  --bg2:   #12121e;
  --bg3:   #1a1a2a;
  --red:   #ff2d55;
  --blue:  #007aff;
  --yel:   #ffd60a;
  --grn:   #30d158;
  --wht:   #f5f5f7;

*{margin:0;padding:0;box-sizing:border-box;}
body{

.ekran{display:none;width:100%;max-width:480px;padding:16px;animation:fadeUp .4s ease both;}
.ekran.aktif{display:flex;flex-direction:column;align-items:center;}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

.kart{
  background:var(--bg2);border:1px solid rgba(255,255,255,.07);

}
.logo{font-family:var(--f1);font-size:56px;line-height:1;display:flex;gap:2px;}
.logo span:first-child{color:var(--red);}
.logo span:last-child{color:var(--blue);}
h1{font-family:var(--f1);font-size:34px;letter-spacing:3px;text-align:center;}
.sub{font-size:13px;color:var(--gry);text-align:center;line-height:1.7;max-width:280px;}

input{
  width:100%;background:var(--bg3);border:1.5px solid rgba(255,255,255,.1);
  border-radius:var(--r);padding:14px 18px;font-size:15px;font-family:var(--f2);
  color:var(--wht);outline:none;transition:border-color var(--t);
}
input:focus{border-color:var(--blue);}
input::placeholder{color:var(--gry);}

.divider{width:100%;display:flex;align-items:center;gap:12px;font-size:12px;color:var(--gry);}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08);}

.btn{
  width:100%;padding:15px;border:none;border-radius:var(--r);
  font-family:var(--f2);font-size:15px;font-weight:800;
  cursor:pointer;transition:all var(--t);letter-spacing:.3px;
}
.btn:hover{transform:translateY(-2px);}
.btn:active{transform:translateY(0);}
.btn-red{background:linear-gradient(135deg,var(--red),#c0183a);color:#fff;box-shadow:0 4px 24px rgba(255,45,85,.35);}
.btn-red:hover{box-shadow:0 8px 32px rgba(255,45,85,.5);}
.btn-blue{background:linear-gradient(135deg,var(--blue),#0055d4);color:#fff;box-shadow:0 4px 24px rgba(0,122,255,.3);}
.btn-sm{width:auto;padding:11px 22px;font-size:14px;}
.btn-ghost{background:var(--bg3);color:var(--wht);border:1.5px solid rgba(255,255,255,.12);}

.hata{
  background:rgba(255,45,85,.12);border:1px solid rgba(255,45,85,.35);
  border-radius:10px;padding:11px 16px;font-size:13px;color:#ff6b85;
  width:100%;text-align:center;display:none;
}

/* BEKLEME */
.spinner{width:52px;height:52px;border:4px solid rgba(255,255,255,.08);border-top-color:var(--red);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.kod-kutu{

}
.kod-kutu:hover{border-color:rgba(255,214,10,.5);}

/* OYUN */
#oyun{max-width:500px;gap:14px;}
.ust{

  width:100%;background:var(--bg2);border-radius:var(--r);

.oyuncu{display:flex;flex-direction:column;gap:3px;}
.oyuncu.sol{align-items:flex-start;}
.oyuncu.sag{align-items:flex-end;}
.o-ad{font-size:12px;color:var(--gry);font-weight:700;text-transform:uppercase;letter-spacing:.5px;}

.harf-alan{

.klavye{width:100%;display:flex;flex-direction:column;gap:7px;}
.satir{display:flex;justify-content:center;gap:5px;flex-wrap:wrap;}
.tus{
  width:44px;height:44px;background:var(--bg3);

  color:var(--wht);font-family:var(--f2);font-size:14px;font-weight:700;

}
.tus:hover:not(:disabled){background:var(--blue);border-color:var(--blue);transform:translateY(-3px);box-shadow:0 6px 18px rgba(0,122,255,.4);}
.tus:active:not(:disabled){transform:translateY(0);}
.tus.ozel{background:rgba(255,214,10,.07);border-color:rgba(255,214,10,.2);color:var(--yel);}
.tus:disabled{opacity:.25;cursor:not-allowed;}

.alt{display:flex;justify-content:center;gap:12px;width:100%;}
.btn-itiraz{

.btn-itiraz:disabled{opacity:.25;cursor:not-allowed;transform:none;}
.bilgi{text-align:center;font-size:13px;color:var(--gry);min-height:20px;font-weight:700;}

/* OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(10,10,18,.88);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;z-index:99;}
.overlay.gizli{display:none;}
.ov-kutu{
  background:var(--bg2);border:1px solid rgba(255,255,255,.1);

  display:flex;flex-direction:column;gap:14px;align-items:center;max-width:320px;
  box-shadow:0 40px 100px rgba(0,0,0,.7);animation:pop .4s cubic-bezier(.34,1.56,.64,1);

@keyframes pop{from{transform:scale(.65);opacity:0}to{transform:scale(1);opacity:1}}
.ov-emoji{font-size:68px;}
.ov-kutu h2{font-family:var(--f1);font-size:34px;letter-spacing:2px;}
.ov-kutu p{color:var(--gry);font-size:14px;line-height:1.7;}
.skor-ozet{display:flex;gap:20px;background:var(--bg3);padding:14px 28px;border-radius:var(--r);font-family:var(--f1);font-size:28px;}
.pulse{font-size:12px;color:var(--gry);animation:nabiz 1s ease infinite;}
@keyframes nabiz{0%,100%{opacity:1}50%{opacity:.3}}

@media(max-width:480px){

  .harf-ekran{font-size:38px;letter-spacing:6px;}
  .tus{width:36px;height:38px;font-size:12px;}
  .kod-kutu{font-size:38px;letter-spacing:6px;padding:14px 20px;}
}
</style>

<script>
// ================================================
// FIREBASE AYARLARI
// ================================================
const firebaseConfig = {
  apiKey: "AIzaSyBwNJei_4boidgtsz7gHI2qLn5qBM13ScA",
  authDomain: "kelime-savasi-1c464.firebaseapp.com",
  databaseURL: "https://kelime-savasi-1c464-default-rtdb.firebaseio.com",
  projectId: "kelime-savasi-1c464",
  storageBucket: "kelime-savasi-1c464.firebasestorage.app",
  messagingSenderId: "107119334082",
  appId: "1:107119334082:web:18d1be8b85fb0c72b5a15b"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ================================================
// TÜRKÇE KELİME LİSTESİ
// ================================================
const kelimeler = [
  "araba","armut","aslan","ayak","balik","bardak","bebek","bisiklet",
  "bulut","cadde","ceket","çanta","çiçek","deniz","dondurma","dünya",
  "elma","fare","fener","fincan","gece","gelincik","gemi","gitar",
  "güneş","hayat","horoz","irmak","kale","kalem","kapı","kaplan",
  "kar","kedi","kemik","kilim","kitap","köpek","köy","kuş","lamba",
  "limon","masa","mavi","melek","meyve","nehir","okul","orman","oyun",
  "pamuk","pencere","portakal","resim","rüzgar","saat","sabun","sandal",
  "sarı","sebze","sepet","şeker","şehir","tablo","taş","telefon","tren",
  "uçak","uyku","üzüm","vapur","yağmur","yaprak","yıldız","yol","yunus",
  "zeytin","bahçe","banka","çarşı","doktor","ekran","fabrika","gazete",
  "hastane","ilaç","köprü","mektup","nota","opera","pazar","radyo",
  "sinema","tiyatro","uzman","vitrin","yazar","anahtar","bilgisayar",
  "çikolata","davul","ekmek","fırın","havlu","iskemle","kavanoz",
  "lokanta","müzik","parfüm","robot","sözlük","tatil","vanilya",
  "akşam","bahar","borsa","çoban","dağ","erik","gece","hava",
  "inci","kovan","lahana","mantar","nar","palto","rende","süt","taksi",
  "umut","vadi","yaban","atlas","boya","cam","dal","ev","fil","gül",
  "has","ip","kaz","lale","mor","nal","ot","pul","renk","ses","top",
  "un","yay","zil","alem","boru","cuma","dere","efe","fal","han",
  "ilan","jan","kap","lan","mum","nane","oje","par","raf","sol",
  "tam","uğur","vay","yem","zam","abla","baba","dede","nine","teyze",
  "amca","dayı","hala","yenge","kuzen","torun","gelin","damat"
];

function kelimeVarMi(p){ return kelimeler.some(k=>k.startsWith(p)); }
function tamKelimeMi(s){ return kelimeler.includes(s) && s.length>=3; }

// ================================================
// OYUN DEĞİŞKENLERİ
// ================================================
let odaKodu = '';
let benimRolum = ''; // 'host' veya 'guest'
let benimAdim = '';
let odaRef = null;
let listeners = [];

// ================================================
// 4 HANELİ RANDOM KOD ÜRET
// ================================================
function kodUret(){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let k = '';
  for(let i=0;i<4;i++) k += chars[Math.floor(Math.random()*chars.length)];
  return k;
}

// ================================================
// ODA OLUŞTUR
// ================================================
async function odaOlustur(){
  const ad = document.getElementById('adInput').value.trim();
  if(!ad){ hataGoster('Lütfen bir ad gir!'); return; }
  benimAdim = ad;
  benimRolum = 'host';

  // Benzersiz kod bul
  let kod;
  do {
    kod = kodUret();
    const snap = await db.ref('odalar/'+kod).get();
    if(!snap.exists()) break;
  } while(true);

  odaKodu = kod;
  odaRef = db.ref('odalar/'+kod);

  // Odayı oluştur
  await odaRef.set({
    host: { ad, skor: 0 },
    durum: 'bekleme',
    harfler: '',
    sira: 'host',
    tur: 1,
    olusturulma: Date.now()
  });

  // Bağlantı kesilince odayı sil
  odaRef.onDisconnect().remove();

  document.getElementById('kodGoster').textContent = kod;
  ekran('bekleme');

  // Guest'in katılmasını bekle
  const ref = odaRef.child('guest');
  const unsub = ref.on('value', snap => {
    if(snap.exists()){
      ref.off('value', unsub);
      oyunuBaslat();
    }
  });
}

// ================================================
// ODAYA KATIL
// ================================================
async function odayaKatil(){
  const ad = document.getElementById('adInput').value.trim();
  const kod = document.getElementById('kodInput').value.trim().toUpperCase();
  if(!ad){ hataGoster('Lütfen bir ad gir!'); return; }
  if(kod.length !== 4){ hataGoster('4 haneli kodu gir!'); return; }

  const snap = await db.ref('odalar/'+kod).get();
  if(!snap.exists()){ hataGoster('Oda bulunamadı! Kodu kontrol et.'); return; }
  const data = snap.val();
  if(data.durum !== 'bekleme'){ hataGoster('Bu oda dolu veya oyun başladı!'); return; }

  benimAdim = ad;
  benimRolum = 'guest';
  odaKodu = kod;
  odaRef = db.ref('odalar/'+kod);

  // Guest olarak katıl
  await odaRef.child('guest').set({ ad, skor: 0 });
  odaRef.onDisconnect().remove();

  oyunuBaslat();
}

// ================================================
// OYUNU BAŞLAT
// ================================================
function oyunuBaslat(){
  ekran('oyun');

  // Firebase'i dinle
  odaRef.on('value', snap => {
    if(!snap.exists()){
      alert('Rakip ayrıldı! Oyun bitti.');
      location.reload();
      return;
    }
    const d = snap.val();
    guncelle(d);
  });
}

// ================================================
// FIREBASE'DEN GELEN VERİYİ EKRANA YANSIT
// ================================================
function guncelle(d){
  if(!d.host || !d.guest) return;

  const benimData   = d[benimRolum];
  const rakipRolum  = benimRolum === 'host' ? 'guest' : 'host';
  const rakipData   = d[rakipRolum];

  // Adlar & skorlar
  document.getElementById('ad1').textContent   = benimAdim;
  document.getElementById('skor1').textContent = benimData.skor || 0;
  document.getElementById('ad2').textContent   = rakipData.ad;
  document.getElementById('skor2').textContent = rakipData.skor || 0;

  // Tur
  document.getElementById('turNo').textContent = `TUR ${d.tur || 1}`;

  // Harfler
  harfEkranGuncelle(d.harfler || '');

  // Sıra
  const bendeSira = d.sira === benimRolum;
  klavyeAktif(bendeSira, d.harfler);
  siraGoster(bendeSira, rakipData.ad, d.harfler);

  // Tur sonu overlay
  if(d.turSonu){
    turOverlayGoster(d.turSonu, benimData.skor || 0, rakipData.skor || 0, rakipData.ad);
  } else {
    document.getElementById('turOverlay').classList.add('gizli');
  }
}

// ================================================
// HARF EKLE
// ================================================
async function harf(h){
  const snap = await odaRef.get();
  const d = snap.val();
  if(!d || d.sira !== benimRolum){ bilgi('Sıra sende değil!', true); return; }
  if(d.turSonu) return;

  const yeni = (d.harfler || '') + h;

  if(!kelimeVarMi(yeni)){
    // Geçersiz — ben kaybettim
    await kaybettim(d, 'gecersizHarf', yeni, null);
    return;
  }
  if(tamKelimeMi(yeni)){
    // Kelime tamamlandı — ben kaybettim
    await kaybettim(d, 'tamamlandi', null, yeni);
    return;
  }

  // Normal harf — sırayı değiştir
  const rakipRolum = benimRolum === 'host' ? 'guest' : 'host';
  await odaRef.update({ harfler: yeni, sira: rakipRolum });
}

// ================================================
// İTİRAZ ET
// ================================================
async function itirazEt(){
  const snap = await odaRef.get();
  const d = snap.val();
  if(!d) return;
  if(d.sira === benimRolum){ bilgi('Kendi sıranda itiraz edemezsin!', true); return; }
  if(!d.harfler){ bilgi('Henüz harf yok!', true); return; }
  if(d.turSonu) return;

  const devamVar = kelimeler.some(k => k.startsWith(d.harfler) && k !== d.harfler);
  const rakipRolum = benimRolum === 'host' ? 'guest' : 'host';

  if(devamVar){
    // Kelime var — ben kaybettim
    await kaybettim(d, 'itirazHaksiz', null, null);
  } else {
    // Kelime yok — rakip kaybetti, ben kazandım
    await rakipKaybetti(d, 'itirazHakli');
  }
}

// ================================================
// KAYIP / KAZANIM İŞLEMLERİ
// ================================================
async function kaybettim(d, sebep, gecersizHarfler, tamamlananKelime){
  const rakipRolum = benimRolum === 'host' ? 'guest' : 'host';
  const rakipSkor  = (d[rakipRolum].skor || 0) + 1;

  await odaRef.update({
    [`${rakipRolum}/skor`]: rakipSkor,
    turSonu: { kaybeden: benimRolum, sebep, gecersizHarfler, tamamlananKelime, zaman: Date.now() }
  });
  yeniTurZamanla(d);
}

async function rakipKaybetti(d, sebep){
  const benimSkor = (d[benimRolum].skor || 0) + 1;
  const rakipRolum = benimRolum === 'host' ? 'guest' : 'host';

  await odaRef.update({
    [`${benimRolum}/skor`]: benimSkor,
    turSonu: { kaybeden: rakipRolum, sebep, zaman: Date.now() }
  });
  yeniTurZamanla(d);
}

function yeniTurZamanla(d){
  // Sadece host yeni turu başlatır (çift yazma önleme)
  if(benimRolum !== 'host') return;
  setTimeout(async () => {
    const snap = await odaRef.get();
    if(!snap.exists()) return;
    const cur = snap.val();
    // Kaybeden başlar
    const kaybeden = cur.turSonu?.kaybeden || 'host';
    await odaRef.update({
      harfler: '',
      sira: kaybeden,
      tur: (cur.tur || 1) + 1,
      turSonu: null
    });
  }, 3000);
}

// ================================================
// TUR OVERLAY
// ================================================
function turOverlayGoster(turSonu, benimSkor, rakipSkor, rakipAd){
  const bendKazandim = turSonu.kaybeden !== benimRolum;

  document.getElementById('ovEmoji').textContent = bendKazandim ? '🏆' : '💀';
  const bas = document.getElementById('ovBaslik');
  bas.textContent = bendKazandim ? 'KAZANDIN!' : 'KAYBETTİN!';
  bas.style.color  = bendKazandim ? 'var(--grn)' : 'var(--red)';

  let acik = '';
  if(turSonu.sebep === 'tamamlandi')    acik = `"${turSonu.tamamlananKelime?.toUpperCase()}" kelimesi tamamlandı!`;
  else if(turSonu.sebep === 'gecersizHarf') acik = `"${turSonu.gecersizHarfler?.toUpperCase()}" ile başlayan kelime yok!`;
  else if(turSonu.sebep === 'itirazHakli')  acik = 'İtiraz haklıydı — kelime yoktu!';
  else if(turSonu.sebep === 'itirazHaksiz') acik = 'İtiraz haksızdı — kelime vardı!';
  document.getElementById('ovAciklama').textContent = acik;

  document.getElementById('ovSkor').innerHTML =
    `<span>${benimAdim}: ${benimSkor}</span><span style="color:var(--gry)">—</span><span>${rakipAd}: ${rakipSkor}</span>`;

  document.getElementById('turOverlay').classList.remove('gizli');
}

// ================================================
// YARDIMCI FONKSİYONLAR
// ================================================
function ekran(id){
  document.querySelectorAll('.ekran').forEach(e=>e.classList.remove('aktif'));
  document.getElementById(id).classList.add('aktif');
}

function harfEkranGuncelle(h){
  const el = document.getElementById('harfEkran');
  const sc = document.getElementById('harfSayac');
  if(!h){ el.innerHTML='<span class="harf-bos">Henüz harf yok...</span>'; sc.textContent='0 harf'; }
  else  { el.textContent = h.toUpperCase(); sc.textContent=`${h.length} harf`; }
}

function klavyeAktif(aktif, harfler){
  document.querySelectorAll('.tus').forEach(t=>t.disabled=!aktif);
  document.getElementById('itirazBtn').disabled = aktif || !harfler;
}

function siraGoster(bendeSira, rakipAd, harfler){
  document.getElementById('siraDiv').textContent = bendeSira ? '⚡ SENİN SIRAN' : `⏳ ${rakipAd}'nın Sırası`;
  document.getElementById('ok1').classList.toggle('aktif', bendeSira);
  document.getElementById('ok2').classList.toggle('aktif', !bendeSira);
}

function bilgi(mesaj, uyari=false){
  const el = document.getElementById('bilgiDiv');
  el.textContent = mesaj;
  el.style.color = uyari ? '#ff6b85' : 'var(--gry)';
  setTimeout(()=>el.textContent='', 2500);
}

function hataGoster(mesaj){
  const el = document.getElementById('hataDiv');
  el.textContent = mesaj; el.style.display='block';
  setTimeout(()=>el.style.display='none', 3000);
}

function koduKopyala(){
  const kod = document.getElementById('kodGoster').textContent;
  navigator.clipboard.writeText(kod).then(()=>{
    const el = document.getElementById('kodGoster');
    const orig = el.textContent;
    el.textContent='✅ Kopyalandı!';
    el.style.fontSize='24px';
    setTimeout(()=>{ el.textContent=orig; el.style.fontSize=''; },2000);
  });
}

// Fiziksel klavye
document.addEventListener('keydown', e=>{
  if(!document.getElementById('oyun').classList.contains('aktif')) return;
  const h = e.key.toLowerCase();
  const gecerli = 'abcçdefgğhıijklmnoöprsştuüvyz';
  if(h.length===1 && gecerli.includes(h)) harf(h);
});
</script>
