<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kelime Savaşı 🗡️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<!-- Firebase CDN (npm gerekmez!) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
:root {
  --bg:    #0a0a12;
  --bg2:   #12121e;
  --bg3:   #1a1a2a;
  --red:   #ff2d55;
  --blue:  #007aff;
  --yel:   #ffd60a;
  --grn:   #30d158;
  --wht:   #f5f5f7;
  --gry:   #636366;
  --f1:    'Bebas Neue', sans-serif;
  --f2:    'Nunito', sans-serif;
  --r:     16px;
  --t:     0.2s cubic-bezier(.4,0,.2,1);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg);color:var(--wht);font-family:var(--f2);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background-image:
    radial-gradient(ellipse at 15% 20%,rgba(255,45,85,.08) 0%,transparent 55%),
    radial-gradient(ellipse at 85% 80%,rgba(0,122,255,.08) 0%,transparent 55%);
}
.ekran{display:none;width:100%;max-width:480px;padding:16px;animation:fadeUp .4s ease both;}
.ekran.aktif{display:flex;flex-direction:column;align-items:center;}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

.kart{
  background:var(--bg2);border:1px solid rgba(255,255,255,.07);
  border-radius:28px;padding:40px 32px;width:100%;
  display:flex;flex-direction:column;align-items:center;gap:20px;
  box-shadow:0 32px 80px rgba(0,0,0,.6);
}
.logo{font-family:var(--f1);font-size:56px;line-height:1;display:flex;gap:2px;}
.logo span:first-child{color:var(--red);}
.logo span:last-child{color:var(--blue);}
h1{font-family:var(--f1);font-size:34px;letter-spacing:3px;text-align:center;}
.sub{font-size:13px;color:var(--gry);text-align:center;line-height:1.7;max-width:280px;}

input{
  width:100%;background:var(--bg3);border:1.5px solid rgba(255,255,255,.1);
  border-radius:var(--r);padding:14px 18px;font-size:15px;font-family:var(--f2);
  color:var(--wht);outline:none;transition:border-color var(--t);
}
input:focus{border-color:var(--blue);}
input::placeholder{color:var(--gry);}

.divider{width:100%;display:flex;align-items:center;gap:12px;font-size:12px;color:var(--gry);}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08);}

.btn{
  width:100%;padding:15px;border:none;border-radius:var(--r);
  font-family:var(--f2);font-size:15px;font-weight:800;
  cursor:pointer;transition:all var(--t);letter-spacing:.3px;
}
.btn:hover{transform:translateY(-2px);}
.btn:active{transform:translateY(0);}
.btn-red{background:linear-gradient(135deg,var(--red),#c0183a);color:#fff;box-shadow:0 4px 24px rgba(255,45,85,.35);}
.btn-red:hover{box-shadow:0 8px 32px rgba(255,45,85,.5);}
.btn-blue{background:linear-gradient(135deg,var(--blue),#0055d4);color:#fff;box-shadow:0 4px 24px rgba(0,122,255,.3);}
.btn-sm{width:auto;padding:11px 22px;font-size:14px;}
.btn-ghost{background:var(--bg3);color:var(--wht);border:1.5px solid rgba(255,255,255,.12);}

.hata{
  background:rgba(255,45,85,.12);border:1px solid rgba(255,45,85,.35);
  border-radius:10px;padding:11px 16px;font-size:13px;color:#ff6b85;
  width:100%;text-align:center;display:none;
}

/* BEKLEME */
.spinner{width:52px;height:52px;border:4px solid rgba(255,255,255,.08);border-top-color:var(--red);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.kod-kutu{
  font-family:var(--f1);font-size:52px;letter-spacing:10px;
  color:var(--yel);background:var(--bg3);padding:18px 32px;
  border-radius:var(--r);border:2px dashed rgba(255,214,10,.25);
  cursor:pointer;transition:all var(--t);user-select:all;
}
.kod-kutu:hover{border-color:rgba(255,214,10,.5);}

/* ÇARK VE KUTULAR */
#carkArea { position: relative; width: 200px; height: 200px; margin: 20px auto; }
#cark { 
  width: 100%; height: 100%; border-radius: 50%; border: 8px solid var(--bg3);
  background: conic-gradient(var(--red) 0 60deg, var(--blue) 60deg 120deg, var(--yel) 120deg 180deg, var(--grn) 180deg 240deg, #9333ea 240deg 300deg, var(--wht) 300deg 360deg);
  transition: transform 3s cubic-bezier(0.1, 0, 0.2, 1);
}
#carkPointer {
  position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
  width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 24px solid var(--wht); z-index: 10;
}
.soru-alani { background: var(--bg3); padding: 15px; border-radius: var(--r); margin-bottom: 15px; text-align: center; border-left: 4px solid var(--yel); }
.soru-metni { font-size: 14px; color: var(--yel); font-weight: 800; text-transform: uppercase; }

.kutular { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 20px 0; min-height: 60px; }
.kutu {
  width: 40px; height: 50px; background: var(--bg3); border: 2px solid rgba(255,255,255,0.1);
  border-radius: 8px; display: flex; align-items: center; justify-content: center;
  font-family: var(--f1); font-size: 30px; color: var(--wht); transition: var(--t);
}
.kutu.acik { background: var(--wht); color: var(--bg); border-color: var(--wht); transform: rotateY(360deg); }
.kutu.sonuc { background: var(--yel); color: var(--bg); border-color: var(--yel); } /* Çark sonucu için */
.kutu.bosluk { background: transparent; border: none; width: 20px; }
.cark-sonuc { font-family: var(--f1); font-size: 36px; color: var(--wht); margin-top: 10px; }
.cark-sonuc.pas { color: var(--red); }
.cark-sonuc.iflas { color: var(--red); }

/* OYUN */
#oyun{max-width:500px;gap:14px;}
.ust{
  display:flex;align-items:center;justify-content:space-between;
  width:100%;background:var(--bg2);border-radius:var(--r);
  padding:16px 20px;border:1px solid rgba(255,255,255,.07);
}
.oyuncu{display:flex;flex-direction:column;gap:3px;}
.oyuncu.sol{align-items:flex-start;}
.oyuncu.sag{align-items:flex-end;}
.o-ad{font-size:12px;color:var(--gry);font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.o-skor{font-family:var(--f1);font-size:40px;line-height:1;}
.o-cikis{cursor:pointer;font-size:11px;color:var(--red);font-weight:800;margin-top:5px;opacity:0.6;transition:var(--t);}
.o-cikis:hover{opacity:1;text-decoration:underline;}
.oyuncu.aktif .o-ad{color:var(--blue);}
.oyuncu.aktif .o-skor{color:var(--blue);}
.orta{text-align:center;}
.tur-no{font-family:var(--f1);font-size:13px;letter-spacing:2px;color:var(--gry);}
.sira{font-size:11px;color:var(--yel);font-weight:800;margin-top:2px;}

.klavye{width:100%;display:flex;flex-direction:column;gap:7px;}
.satir{display:flex;justify-content:center;gap:5px;flex-wrap:wrap;}
.tus{
  width:44px;height:44px;background:var(--bg3);
  border:1.5px solid rgba(255,255,255,.09);border-radius:10px;
  color:var(--wht);font-family:var(--f2);font-size:14px;font-weight:700;
  cursor:pointer;transition:all var(--t);
}
.tus:hover:not(:disabled){background:var(--blue);border-color:var(--blue);transform:translateY(-3px);box-shadow:0 6px 18px rgba(0,122,255,.4);}
.tus:active:not(:disabled){transform:translateY(0);}
.tus.ozel{background:rgba(255,214,10,.07);border-color:rgba(255,214,10,.2);color:var(--yel);}
.tus:disabled{opacity:.25;cursor:not-allowed;}

.alt{display:flex;justify-content:center;gap:12px;width:100%;}
.btn-itiraz{
  background:linear-gradient(135deg,var(--yel),#e6a800);color:#111;
  font-weight:900;padding:13px 28px;border-radius:50px;width:auto;
  box-shadow:0 4px 20px rgba(255,214,10,.3);
}
.btn-itiraz:disabled{opacity:.25;cursor:not-allowed;transform:none;}
.bilgi{text-align:center;font-size:13px;color:var(--gry);min-height:20px;font-weight:700;}

/* OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(10,10,18,.88);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;z-index:99;}
.overlay.gizli{display:none;}
.ov-kutu{
  background:var(--bg2);border:1px solid rgba(255,255,255,.1);
  border-radius:28px;padding:48px 40px;text-align:center;
  display:flex;flex-direction:column;gap:14px;align-items:center;max-width:320px;
  box-shadow:0 40px 100px rgba(0,0,0,.7);animation:pop .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes pop{from{transform:scale(.65);opacity:0}to{transform:scale(1);opacity:1}}
.ov-emoji{font-size:68px;}
.ov-kutu h2{font-family:var(--f1);font-size:34px;letter-spacing:2px;}
.ov-kutu p{color:var(--gry);font-size:14px;line-height:1.7;}
.skor-ozet{display:flex;gap:20px;background:var(--bg3);padding:14px 28px;border-radius:var(--r);font-family:var(--f1);font-size:28px;}
.pulse{font-size:12px;color:var(--gry);animation:nabiz 1s ease infinite;}
@keyframes nabiz{0%,100%{opacity:1}50%{opacity:.3}}

@media(max-width:480px){
  .kart{padding:28px 18px;}
  .harf-ekran{font-size:38px;letter-spacing:6px;}
  .tus{width:36px;height:38px;font-size:12px;}
  .kod-kutu{font-size:38px;letter-spacing:6px;padding:14px 20px;}
}
</style>
</head>
<body>

<!-- GİRİŞ -->
<div id="giris" class="ekran aktif">
  <div class="kart">
    <div class="logo"><span>K</span><span>S</span></div>
    <h1>Kelime Savaşı</h1>
    <p class="sub">Sırayla harf ekle — Kelimeyi tamamlarsan kaybedersin!</p>
    <input id="adInput" type="text" placeholder="Adını gir..." maxlength="14"/>
    <button class="btn btn-red" onclick="odaOlustur()">🏠 Oda Oluştur</button>

<!-- BEKLEME -->
<div id="bekleme" class="ekran">
  <div class="kart">
    <div class="spinner"></div>

    <div class="kod-kutu" id="kodGoster" onclick="koduKopyala()" title="Kopyalamak için tıkla">----</div>
    <button class="btn btn-ghost btn-sm" onclick="koduKopyala()">📋 Kopyala</button>
    <p style="font-size:12px;color:var(--gry);">Arkadaşın bu kodu girince oyun başlar</p>
  </div>
</div>

<!-- OYUN -->
<div id="oyun" class="ekran">
  <div class="ust">
    <div class="oyuncu sol" id="ok1">
      <div class="o-ad" id="ad1">Sen</div>
      <div class="o-skor" id="skor1">0</div>
    </div>
    <div class="orta">
      <div class="tur-no" id="turNo">TUR 1</div>
      <div class="sira" id="siraDiv">—</div>
    </div>
    <div class="oyuncu sag" id="ok2">
      <div class="o-ad" id="ad2">Rakip</div>
      <div class="o-skor" id="skor2">0</div>
      <div class="o-cikis" onclick="cikisYap()">[ AYRIL ]</div>
    </div>
  </div>

  <div class="soru-alani">
    <div class="soru-metni" id="soruMetni">İpucu Yükleniyor...</div>
  </div>

  <div class="kutular" id="kelimeKutulari"></div>

  <div id="carkArea">
    <div id="carkPointer"></div>
    <div id="cark"></div>
    <div class="cark-sonuc" id="carkSonuc"></div>
  </div>

  <div class="klavye">
    <!-- Klavye butonları harf('x') yerine harfTahmin('X') çağıracak -->
    <div class="satir">
      <button class="tus" onclick="harfTahmin('E')">E</button>

      <button class="tus" onclick="harfTahmin('U')">U</button> <button class="tus" onclick="harfTahmin('I')">I</button> <button class="tus" onclick="harfTahmin('O')">O</button> <button class="tus" onclick="harfTahmin('P')">P</button>

      <button class="tus" onclick="harfTahmin('A')">A</button> <button class="tus" onclick="harfTahmin('S')">S</button> <button class="tus" onclick="harfTahmin('D')">D</button> <button class="tus" onclick="harfTahmin('F')">F</button> <button class="tus" onclick="harfTahmin('G')">G</button> <button class="tus" onclick="harfTahmin('H')">H</button> <button class="tus" onclick="harfTahmin('J')">J</button> <button class="tus" onclick="harfTahmin('K')">K</button> <button class="tus" onclick="harfTahmin('L')">L</button>
    </div>

      <button class="tus" onclick="harfTahmin('Z')">Z</button> <button class="tus" onclick="harfTahmin('C')">C</button> <button class="tus" onclick="harfTahmin('V')">V</button> <button class="tus" onclick="harfTahmin('B')">B</button> <button class="tus" onclick="harfTahmin('N')">N</button> <button class="tus" onclick="harfTahmin('M')">M</button>

      <button class="tus ozel" onclick="harfTahmin('Ç')">Ç</button> <button class="tus ozel" onclick="harfTahmin('Ş')">Ş</button> <button class="tus ozel" onclick="harfTahmin('Ğ')">Ğ</button> <button class="tus ozel" onclick="harfTahmin('Ü')">Ü</button> <button class="tus ozel" onclick="harfTahmin('Ö')">Ö</button> <button class="tus ozel" onclick="harfTahmin('İ')">İ</button>

  <div class="alt">
    <button class="btn btn-blue" id="carkBtn" onclick="carkCevir()">🔄 ÇARKı ÇEVİR</button>

  </div>
  <div class="bilgi" id="bilgiDiv"></div>
</div>

<!-- TUR SONU OVERLAY -->
<div class="overlay gizli" id="turOverlay">
  <div class="ov-kutu">
    <div class="ov-emoji" id="ovEmoji">🏆</div>
    <h2 id="ovBaslik">KAZANDIN!</h2>
    <p id="ovAciklama"></p>
    <div class="skor-ozet" id="ovSkor"></div>
    <p class="pulse">Yeni tur başlıyor...</p>
  </div>
</div>

<script>
// ================================================
// FIREBASE AYARLARI
// ================================================
const firebaseConfig = {
  apiKey: "AIzaSyBwNJei_4boidgtsz7gHI2qLn5qBM13ScA",
  authDomain: "kelime-savasi-1c464.firebaseapp.com",
  databaseURL: "https://kelime-savasi-1c464-default-rtdb.firebaseio.com",
  projectId: "kelime-savasi-1c464",
  storageBucket: "kelime-savasi-1c464.firebasestorage.app",
  messagingSenderId: "107119334082",
  appId: "1:107119334082:web:18d1be8b85fb0c72b5a15b"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ================================================
// TÜRKÇE KELİME LİSTESİ
// ================================================
const sorular = [
  { s: "Elde taşınan, yağmurdan koruyan eşya", c: "ŞEMSİYE" },
  { s: "Geceleri gökyüzünde parlayan dev kütle", c: "YILDIZ" },
  { s: "Türkiye'nin başkenti", c: "ANKARA" },
  { s: "Bilgisayarda verileri saklayan birim", c: "BELLEK" },
  { s: "Mutfakta yemek pişirmeye yarayan araç", c: "TENCERE" },
  { s: "Dört ayağı olan, sadık evcil hayvan", c: "KÖPEK" }
];
const carkDilimleri = [100, 200, 300, 500, 750, 1000, 'PAS', 'İFLAS'];

function normalize(s) { return s.toLocaleUpperCase('tr-TR').trim(); } // Tüm kelimeler büyük harf olacak

// ================================================
// OYUN DEĞİŞKENLERİ
// ================================================
let odaKodu = '';
let benimRolum = ''; // 'host' veya 'guest'
let benimAdim = ''; // Kullanıcının adı
let odaRef = null;
let carkDonuyor = false;
let suankiSoru = null;
let turResetleniyor = false; // Yeni tur zamanlayıcısının birden fazla tetiklenmesini önler

// ================================================
// YARDIMCI FONKSİYONLAR
// ================================================
function ekran(id){
  document.querySelectorAll('.ekran').forEach(e=>e.classList.remove('aktif'));
  document.getElementById(id).classList.add('aktif');
}

function bilgi(mesaj, uyari=false){
  const el = document.getElementById('bilgiDiv');
  el.textContent = mesaj;
  el.style.color = uyari ? '#ff6b85' : 'var(--gry)';
  setTimeout(()=>el.textContent='', 2500);
}

function hataGoster(mesaj){
  const el = document.getElementById('hataDiv');
  el.textContent = mesaj; el.style.display='block';
  setTimeout(()=>el.style.display='none', 3000);
}

function koduKopyala(){
  const kod = document.getElementById('kodGoster').textContent;
  navigator.clipboard.writeText(kod).then(()=>{
    const el = document.getElementById('kodGoster');
    const orig = el.textContent;
    el.textContent='✅ Kopyalandı!';
    el.style.fontSize='24px';
    setTimeout(()=>{ el.textContent=orig; el.style.fontSize=''; },2000);
  });
}

// ================================================
// 4 HANELİ RANDOM KOD ÜRET
// ================================================
function kodUret(){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let k = '';
  for(let i=0;i<4;i++) k += chars[Math.floor(Math.random()*chars.length)];
  return k;
}

// ================================================
// ODA OLUŞTUR
// ================================================
async function odaOlustur(){
  const ad = document.getElementById('adInput').value.trim();
  if(!ad){ hataGoster('Lütfen bir ad gir!'); return; }
  benimAdim = ad;
  benimRolum = 'host';

  // Benzersiz kod bul
  let kod;
  do {
    kod = kodUret();
    const snap = await db.ref('odalar/'+kod).get();
    if(!snap.exists()) break;
  } while(true);

  odaKodu = kod;
  odaRef = db.ref('odalar/'+kod);

  const soruIdx = Math.floor(Math.random() * sorular.length);

  // Odayı oluştur
  await odaRef.set({
    host: { ad, skor: 0 },
    durum: 'bekleme',
    acilanHarfler: '', // Açılan harfler
    tahminEdilenHarfler: '', // Tahmin edilen tüm harfler (doğru/yanlış)
    sira: 'host',
    tur: 1,
    olusturulma: Date.now(),
    soruIdx: soruIdx,
    carkAci: 0
  });

  // Bağlantı kesilince odayı sil
  odaRef.onDisconnect().remove();

  document.getElementById('kodGoster').textContent = kod;
  ekran('bekleme');

  // Guest'in katılmasını bekle
  const ref = odaRef.child('guest');
  const unsub = ref.on('value', snap => {
    if(snap.exists()){
      ref.off('value', unsub);
      oyunuBaslat();
    }
  });
}

// ================================================
// ODAYA KATIL
// ================================================
async function odayaKatil(){
  const ad = document.getElementById('adInput').value.trim();
  const kod = document.getElementById('kodInput').value.trim().toUpperCase();
  if(!ad){ hataGoster('Lütfen bir ad gir!'); return; }
  if(kod.length !== 4){ hataGoster('4 haneli kodu gir!'); return; }

  const snap = await db.ref('odalar/'+kod).get();
  if(!snap.exists()){ hataGoster('Oda bulunamadı! Kodu kontrol et.'); return; }
  const data = snap.val();
  if(data.durum !== 'bekleme'){ hataGoster('Bu oda dolu veya oyun başladı!'); return; }

  benimAdim = ad;
  benimRolum = 'guest';
  odaKodu = kod;
  odaRef = db.ref('odalar/'+kod);

  // Guest olarak katıl
  await odaRef.child('guest').set({ ad, skor: 0 });
  odaRef.onDisconnect().remove();

  await odaRef.update({ durum: 'oyunda' }); // Oyun başladı
  oyunuBaslat();
}

// ================================================
// OYUNU BAŞLAT
// ================================================
function oyunuBaslat(){
  ekran('oyun');

  // Firebase'i dinle
  const oyunuDinle = odaRef.on('value', snap => {
    if(!snap.exists()){
      odaRef.off('value', oyunuDinle);
      alert('Oda kapatıldı veya rakip ayrıldı.');
      window.location.reload();
      odaRef = null; // Oda referansını temizle
      return;
    }
    const d = snap.val();
    guncelle(d);
  });
}

// ================================================
// FIREBASE'DEN GELEN VERİYİ EKRANA YANSIT
// ================================================
function guncelle(d){
  if(!d.host || !d.guest) return;

  const benimData   = d[benimRolum];
  const rakipRolum  = benimRolum === 'host' ? 'guest' : 'host';
  const rakipData   = d[rakipRolum];

  // Adlar & skorlar
  document.getElementById('ad1').textContent   = benimAdim;
  document.getElementById('skor1').textContent = benimData.skor || 0;
  document.getElementById('ad2').textContent   = rakipData.ad;
  document.getElementById('skor2').textContent = rakipData.skor || 0;

  // Tur
  document.getElementById('turNo').textContent = `TUR ${d.tur || 1}`;
  
  // Soru
  suankiSoru = sorular[d.soruIdx];
  document.getElementById('soruMetni').textContent = suankiSoru.s;

  // Çark
  document.getElementById('cark').style.transform = `rotate(${d.carkAci}deg)`;
  document.getElementById('carkSonuc').textContent = d.carkDegeri ? d.carkDegeri : '';
  document.getElementById('carkSonuc').className = `cark-sonuc ${typeof d.carkDegeri === 'string' ? d.carkDegeri.toLowerCase() : ''}`;

  // Kutuları Çiz
  kutulariGuncelle(suankiSoru.c, d.acilanHarfler || '');

  // Sıra
  const bendeSira = d.sira === benimRolum;
  
  // Klavye ve butonların durumu
  const carkCevrildiVeHarfBekleniyor = d.carkDurum === 'bekliyor';
  klavyeAktif(bendeSira && carkCevrildiVeHarfBekleniyor, d.tahminEdilenHarfler);
  document.getElementById('carkBtn').disabled = !bendeSira || carkCevrildiVeHarfBekleniyor;
  document.getElementById('tahminEtBtn').disabled = !bendeSira; // Kelime tahmin et butonu her zaman aktif olabilir

  siraGoster(bendeSira, rakipData.ad);

  // Tur sonu overlay
  if(d.turSonu){
    turOverlayGoster(d.turSonu, benimData.skor || 0, rakipData.skor || 0, rakipData.ad);
    // Sadece host yeni turu zamanlar
    if(benimRolum === 'host' && !turResetleniyor){
      turResetleniyor = true;
      yeniTurZamanla();
    }
  } else {
    document.getElementById('turOverlay').classList.add('gizli');
    turResetleniyor = false;
  }
}

// ================================================
// ÇARK ÇEVİR
// ================================================
async function carkCevir(){
  const snap = await odaRef.get();
  const d = snap.val();
  if(d.sira !== benimRolum || carkDonuyor){ bilgi('Sıra sende değil veya çark dönüyor!', true); return; }
  if(d.turSonu) return;

  carkDonuyor = true;
  const rastgeleAci = Math.floor(Math.random() * 360) + 1800; // En az 5 tam tur
  const dilimIndex = Math.floor((360 - (rastgeleAci % 360)) / (360 / carkDilimleri.length));
  const carkDegeri = carkDilimleri[dilimIndex];

  await odaRef.update({ carkAci: rastgeleAci, carkDurum: 'dönüyor', carkDegeri: null });
  
  setTimeout(async () => {
    carkDonuyor = false;
    await odaRef.update({ carkDegeri: carkDegeri, carkDurum: 'bekliyor' });

    if(carkDegeri === 'PAS'){
      bilgi('PAS! Sıra rakibe geçti.', true);
      const rakipRolum = benimRolum === 'host' ? 'guest' : 'host';
      await odaRef.update({ sira: rakipRolum, carkDurum: null });
    } else if (carkDegeri === 'İFLAS'){
      bilgi('İFLAS! Tüm puanların silindi ve sıra rakibe geçti.', true);
      const rakipRolum = benimRolum === 'host' ? 'guest' : 'host';
      await odaRef.update({ 
        [`${benimRolum}/skor`]: 0, // Turdaki puanı sıfırla
        sira: rakipRolum, 
        carkDurum: null 
      });
    } else {
      bilgi(`Çark ${carkDegeri} puanında durdu! Harf seçebilirsin.`);
    }
  }, 3000); // Çarkın dönme süresi
}

// ================================================
// KUTULARI GÜNCELLE
// ================================================
function kutulariGuncelle(cevap, acilanlar){
  const container = document.getElementById('kelimeKutulari');
  container.innerHTML = '';
  cevap.split('').forEach(harf => {
    if(harf === ' '){
      const d = document.createElement('div'); d.className = 'kutu bosluk';
      container.appendChild(d);
    } else {
      const d = document.createElement('div');
      const acik = acilanlar.includes(harf);
      d.className = `kutu ${acik ? 'acik' : ''}`;
      d.textContent = acik ? harf : '';
      container.appendChild(d);
    }
  });
}

// ================================================
// HARF TAHMİN ET
// ================================================
async function harfTahmin(h){
  const snap = await odaRef.get();
  const d = snap.val();
  if(d.sira !== benimRolum || d.carkDurum !== 'bekliyor'){ bilgi('Sıra sende değil veya çark çevrilmedi!', true); return; }
  if(d.turSonu) return;

  const tahminEdilenHarfler = d.tahminEdilenHarfler || '';
  if(tahminEdilenHarfler.includes(h)){
    bilgi(`"${h}" harfi zaten tahmin edildi!`, true);
    return;
  }

  const cevap = suankiSoru.c;
  const rakipRolum = benimRolum === 'host' ? 'guest' : 'host';
  const carkDegeri = d.carkDegeri;

  if(cevap.includes(h)){
    // Harf doğru
    let harfSayisi = 0;
    for(let i=0; i<cevap.length; i++){
      if(cevap[i] === h) harfSayisi++;
    }
    const kazanilanPuan = carkDegeri * harfSayisi;
    const benimYeniSkor = (d[benimRolum].skor || 0) + kazanilanPuan;
    const yeniAcilanHarfler = (d.acilanHarfler || '') + h;

    bilgi(`"${h}" harfi doğru! ${harfSayisi} adet var. ${kazanilanPuan} puan kazandın!`);

    // Kelime tamamlandı mı?
    const tamamlandiMi = cevap.split('').every(char => char === ' ' || yeniAcilanHarfler.includes(char));

    if(tamamlandiMi){
      await rakipKaybetti(d, 'tamamlandi', benimYeniSkor, yeniAcilanHarfler); // Ben kazandım
    } else {
      await odaRef.update({ 
        acilanHarfler: yeniAcilanHarfler,
        tahminEdilenHarfler: tahminEdilenHarfler + h,
        [`${benimRolum}/skor`]: benimYeniSkor,
        carkDurum: null // Yeni çark çevirme hakkı
      });
    }
  } else {
    // Harf yanlış
    bilgi(`"${h}" harfi kelimede yok. Sıra rakibe geçti.`, true);
    await odaRef.update({ sira: rakipRolum, tahminEdilenHarfler: tahminEdilenHarfler + h, carkDurum: null });
  }
}

// ================================================
// KELİMEYİ TAHMİN ET
// ================================================
async function kelimeTahminEt(){
  const snap = await odaRef.get();
  const d = snap.val();
  if(d.sira !== benimRolum){ bilgi('Sıra sende değil!', true); return; }
  if(d.turSonu) return;

  const tahmin = prompt('Kelimenin tamamını tahmin et:').toLocaleUpperCase('tr-TR').trim();
  if(!tahmin) return;

  const cevap = suankiSoru.c;
  const rakipRolum = benimRolum === 'host' ? 'guest' : 'host';

  if(tahmin === cevap){
    // Doğru tahmin!
    bilgi('Tebrikler! Kelimeyi doğru tahmin ettin!');
    // Kalan harf başına puan eklenebilir veya sabit puan verilebilir.
    // Şimdilik sadece turu kazansın.
    await rakipKaybetti(d, 'tamamlandi', (d[benimRolum].skor || 0) + 500, cevap); // 500 bonus puan
  } else {
    // Yanlış tahmin
    bilgi('Yanlış tahmin! Sıra rakibe geçti.', true);
    await kaybettim(d, 'yanlisTahmin', tahmin, null); // Ben kaybettim
  }
}

// ================================================
// KAYIP / KAZANIM İŞLEMLERİ
// ================================================
async function kaybettim(d, sebep, yanlisTahminKelime, tamamlananKelime){
  const rakipRolum = benimRolum === 'host' ? 'guest' : 'host';
  const rakipSkor  = (d[rakipRolum].skor || 0) + 1;

  await odaRef.update({
    [`${rakipRolum}/skor`]: rakipSkor,
    turSonu: { kaybeden: benimRolum, sebep, yanlisTahminKelime, tamamlananKelime, zaman: Date.now() }
  });
}

async function rakipKaybetti(d, sebep, benimYeniSkor, tamamlananKelime){
  const benimSkor = benimYeniSkor || ((d[benimRolum].skor || 0) + 1); // Eğer yeni skor verilmediyse 1 puan ekle
  const rakipRolum = benimRolum === 'host' ? 'guest' : 'host';

  await odaRef.update({
    [`${benimRolum}/skor`]: benimSkor,
    turSonu: { kaybeden: rakipRolum, sebep, tamamlananKelime, zaman: Date.now() }
  });
}

function yeniTurZamanla(){
  // Host tarafından guncelle() içinde çağrılır
  setTimeout(async () => {
    if(!odaRef) return;
    const snap = await odaRef.get();
    if(!snap.exists()) return;
    const cur = snap.val();
    const kaybeden = cur.turSonu?.kaybeden || 'host';
    const yeniSoruIdx = Math.floor(Math.random() * sorular.length);
    await odaRef.update({
      acilanHarfler: '', // Açılan harfleri sıfırla
      tahminEdilenHarfler: '', // Tahmin edilen harfleri sıfırla
      sira: kaybeden,
      tur: (cur.tur || 1) + 1,
      turSonu: null,
      soruIdx: yeniSoruIdx,
      carkDegeri: null,
      carkDurum: null
    });
  }, 3000);
}

async function cikisYap(){
  if(!confirm('Odadan ayrılmak istediğine emin misin?')) return;
  if(odaRef){
    if(benimRolum === 'host') await odaRef.remove();
    else {
      await odaRef.child('guest').remove();
    }
  }
  location.reload();
}

// ================================================
// TUR OVERLAY
// ================================================
function turOverlayGoster(turSonu, benimSkor, rakipSkor, rakipAd){
  const bendKazandim = turSonu.kaybeden !== benimRolum;

  document.getElementById('ovEmoji').textContent = bendKazandim ? '🏆' : '💀';
  const bas = document.getElementById('ovBaslik');
  bas.textContent = bendKazandim ? 'KAZANDIN!' : 'KAYBETTİN!';
  bas.style.color  = bendKazandim ? 'var(--grn)' : 'var(--red)';

  let acik = '';
  if(turSonu.sebep === 'tamamlandi')    acik = `"${turSonu.tamamlananKelime?.toLocaleUpperCase('tr-TR')}" kelimesi bulundu!`;
  else if(turSonu.sebep === 'yanlisTahmin') acik = `"${turSonu.yanlisTahminKelime?.toLocaleUpperCase('tr-TR')}" yanlış tahmin edildi!`;
  document.getElementById('ovAciklama').textContent = acik;

  document.getElementById('ovSkor').innerHTML =
    `<span>${benimAdim}: ${benimSkor}</span><span style="color:var(--gry)">—</span><span>${rakipAd}: ${rakipSkor}</span>`;

  document.getElementById('turOverlay').classList.remove('gizli');
}

function klavyeAktif(aktif, tahminEdilenHarfler){
  document.querySelectorAll('.tus').forEach(t=>{
    const harf = t.textContent.toLocaleUpperCase('tr-TR');
    t.disabled = !aktif || tahminEdilenHarfler.includes(harf);
  });
}

function siraGoster(bendeSira, rakipAd){
  document.getElementById('siraDiv').textContent = bendeSira ? '⚡ SENİN SIRAN' : `⏳ ${rakipAd}'nın Sırası`;
  document.getElementById('ok1').classList.toggle('aktif', bendeSira);
  document.getElementById('ok2').classList.toggle('aktif', !bendeSira);
}

// Fiziksel klavye
document.addEventListener('keydown', e=>{
  const inputlar = ['INPUT', 'TEXTAREA'];
  if(inputlar.includes(document.activeElement.tagName)) return;
  if(!document.getElementById('oyun').classList.contains('aktif')) return;
  const h = e.key.toLocaleUpperCase('tr-TR');
  const gecerli = 'ABCÇDEFGĞHIİJKLMNOÖPRSŞTUÜVYZ';
  if(h.length===1 && gecerli.includes(h)) harfTahmin(h);
});
</script>
